name: Data Quality Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Run Expectation Suites
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check pipeline/ alerts/
        continue-on-error: true

      # CRITICAL: create reports dir before any suite runs
      - name: Prepare output directories
        run: mkdir -p reports

      - name: Run validation — Suite 01 Nulls
        id: suite_01
        run: python pipeline/run_validations.py --suite suite_01_nulls
        continue-on-error: true

      - name: Run validation — Suite 02 Data Types
        id: suite_02
        run: python pipeline/run_validations.py --suite suite_02_data_types
        continue-on-error: true

      - name: Run validation — Suite 03 Value Ranges
        id: suite_03
        run: python pipeline/run_validations.py --suite suite_03_value_ranges
        continue-on-error: true

      - name: Run validation — Suite 04 Referential Integrity
        id: suite_04
        run: python pipeline/run_validations.py --suite suite_04_referential_integrity
        continue-on-error: true

      - name: Generate full HTML report
        run: python pipeline/run_validations.py --report reports/dq_report.html
        continue-on-error: true

      - name: Upload DQ HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dq-report-${{ github.run_number }}
          path: reports/dq_report.html
          retention-days: 30

      - name: Upload validation log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-log-${{ github.run_number }}
          path: reports/validation.log
          retention-days: 30

      - name: Upload alerts log
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('reports/alerts.log') != ''
        with:
          name: alerts-log-${{ github.run_number }}
          path: reports/alerts.log
          retention-days: 30

      - name: Post summary to GitHub
        if: always()
        run: |
          echo "## 📊 Data Quality Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| suite_01_nulls | ${{ steps.suite_01.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| suite_02_data_types | ${{ steps.suite_02.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| suite_03_value_ranges | ${{ steps.suite_03.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| suite_04_referential_integrity | ${{ steps.suite_04.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full HTML report available in workflow artifacts." >> $GITHUB_STEP_SUMMARY

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t data-quality-framework:ci .

      - name: Docker smoke test
        run: |
          docker run --rm \
            -v "$(pwd)/reports:/app/reports" \
            data-quality-framework:ci \
            python pipeline/run_validations.py
        continue-on-error: true
